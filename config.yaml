# NovoExplorer Configuration
project_name: "My RNA-Seq Experiment"

# Path to Novogene delivery folder(s)
data_dir: "./data"
output_dir: "./results"

# Organism (determines gene name mappings and gene set databases)
organism: "human"   # "human" or "mouse"

# Differential expression thresholds
padj_threshold: 0.05
log2fc_threshold: 1.0

# Whether to re-run DE with pyDESeq2 even if Novogene results exist
rerun_de: false

# Contrasts (leave as "auto" to discover from folder names)
comparisons: "auto"
# Or specify explicitly:
# comparisons:
#   - ["Treatment", "Control"]
#   - ["DrugA", "Vehicle"]

# Gene similarity
# Number of top-variable genes included in the precomputed similarity matrix.
similarity_variable_genes: 5000

# Signatures
# Minimum number of comparisons a pathway must be enriched in to be called a
# "core" signature.
signature_min_comparisons: 2
# Gene-set databases for enrichment. These are passed to gseapy; see
# https://maayanlab.cloud/Enrichr/#libraries for the full list.
gene_set_databases:
  - "MSigDB_Hallmark_2020"
  - "GO_Biological_Process_2023"
  - "KEGG_2021_Human"
